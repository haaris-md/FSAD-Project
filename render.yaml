services:
  - type: web
    name: event-management-backend
    runtime: node
    rootDir: Event-management-system-FEDF--main/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Add database env vars here if needed
      # - key: DB_HOST
      #   value: <your-db-host>
      # - key: DB_USER
      #   value: <your-db-user>
      # - key: DB_PASSWORD
      #   value: <your-db-password>
      # - key: DB_NAME
      #   value: <your-db-name>

  - type: static
    name: event-management-frontend
    rootDir: Event-management-system-FEDF--main
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://<your-backend-service>.onrender.com